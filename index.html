<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a2744">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Controle de sinal e restante das suas instalações">
  <title>InstalaSaldo</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ========== TELA LOGIN ========== -->
  <div id="screen-login" class="screen active">
    <div class="login-container">
      <div class="login-logo">
        <div class="logo-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="12" fill="#1a2744"/>
            <text x="24" y="30" text-anchor="middle" fill="white" font-size="18" font-weight="800" font-family="Inter, sans-serif">IS</text>
          </svg>
        </div>
        <h1 class="login-title">InstalaSaldo</h1>
        <p class="login-subtitle">Controle de sinal e restante das suas instalações</p>
      </div>
      <form id="login-form" class="login-form">
        <div class="input-group">
          <label for="input-nome">Seu nome</label>
          <input type="text" id="input-nome" placeholder="Digite seu nome" autocomplete="name" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="btn-entrar">
          Entrar
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>
    </div>
  </div>

  <!-- ========== TELA DASHBOARD ========== -->
  <div id="screen-dashboard" class="screen">
    <header class="dashboard-header">
      <div class="header-content">
        <div class="header-text">
          <h2 class="greeting" id="greeting-name">Olá, Usuário</h2>
          <p class="date-display" id="date-display"></p>
        </div>
        <button class="btn-icon" id="btn-logout" title="Sair">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>

    <main class="dashboard-body">
      <!-- Cards de Indicadores -->
      <div class="cards-grid">
        <div class="card card-recebido">
          <div class="card-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          </div>
          <p class="card-label">Total Recebido</p>
          <p class="card-value" id="total-recebido">R$ 0,00</p>
        </div>
        <div class="card card-pendente">
          <div class="card-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <p class="card-label">Total a Receber</p>
          <p class="card-value" id="total-pendente">R$ 0,00</p>
        </div>
        <div class="card card-servicos">
          <div class="card-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          </div>
          <p class="card-label">Serviços Pendentes</p>
          <p class="card-value" id="servicos-pendentes">0</p>
        </div>
      </div>

      <!-- Barra proporcional -->
      <div class="progress-section">
        <div class="progress-header">
          <span class="progress-label">Visão Geral</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar">
            <div class="progress-fill-recebido" id="progress-recebido"></div>
            <div class="progress-fill-pendente" id="progress-pendente"></div>
          </div>
        </div>
        <div class="progress-legend">
          <span class="legend-item legend-recebido"><span class="legend-dot"></span> Recebido</span>
          <span class="legend-item legend-pendente"><span class="legend-dot"></span> Pendente</span>
        </div>
      </div>

      <!-- Lista de Serviços -->
      <div class="services-section">
        <h3 class="section-title">Serviços</h3>
        <div id="services-list" class="services-list">
          <!-- rendered by JS -->
        </div>
        <div id="empty-state" class="empty-state" style="display:none;">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#c0c6d0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          <p>Nenhum serviço cadastrado</p>
          <span>Toque no botão abaixo para adicionar</span>
        </div>
      </div>
    </main>

    <!-- FAB -->
    <button class="fab" id="btn-novo-servico" title="Novo Serviço">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- ========== TELA NOVO SERVIÇO ========== -->
  <div id="screen-new-service" class="screen">
    <header class="form-header">
      <button class="btn-back" id="btn-voltar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <h2 class="form-title">Novo Serviço</h2>
      <div style="width:40px"></div>
    </header>
    <form id="service-form" class="service-form">
      <div class="input-group">
        <label for="campo-cliente">Nome do Cliente</label>
        <input type="text" id="campo-cliente" placeholder="Ex: João Silva" required>
      </div>
      <div class="input-group">
        <label for="campo-tipo">Tipo de Instalação</label>
        <input type="text" id="campo-tipo" placeholder="Ex: Ar-condicionado, Energia Solar...">
      </div>
      <div class="input-group">
        <label for="campo-valor-total">Valor Total (R$)</label>
        <input type="number" id="campo-valor-total" placeholder="0,00" min="0" step="0.01" required>
      </div>
      <div class="input-group">
        <label for="campo-valor-recebido">Valor Já Recebido (R$)</label>
        <input type="number" id="campo-valor-recebido" placeholder="0,00" min="0" step="0.01" required>
      </div>
      <div class="input-group">
        <label for="campo-data">Data Combinada para Pagamento Final</label>
        <input type="date" id="campo-data">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-save">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Salvar Serviço
      </button>
    </form>
  </div>

  <!-- ========== TELA EDITAR SERVIÇO ========== -->
  <div id="screen-edit-service" class="screen">
    <header class="form-header">
      <button class="btn-back" id="btn-voltar-edit">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <h2 class="form-title">Editar Serviço</h2>
      <div style="width:40px"></div>
    </header>
    <form id="edit-service-form" class="service-form">
      <input type="hidden" id="edit-id">
      <div class="input-group">
        <label for="edit-cliente">Nome do Cliente</label>
        <input type="text" id="edit-cliente" required>
      </div>
      <div class="input-group">
        <label for="edit-tipo">Tipo de Instalação</label>
        <input type="text" id="edit-tipo">
      </div>
      <div class="input-group">
        <label for="edit-valor-total">Valor Total (R$)</label>
        <input type="number" id="edit-valor-total" min="0" step="0.01" required>
      </div>
      <div class="input-group">
        <label for="edit-valor-recebido">Valor Já Recebido (R$)</label>
        <input type="number" id="edit-valor-recebido" min="0" step="0.01" required>
      </div>
      <div class="input-group">
        <label for="edit-data">Data Combinada para Pagamento Final</label>
        <input type="date" id="edit-data">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-save">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Salvar Alterações
      </button>
      <button type="button" class="btn btn-danger btn-block" id="btn-delete-service">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        Excluir Serviço
      </button>
    </form>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
